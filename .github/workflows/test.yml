name: API Tests

on:
  push:
  workflow_dispatch:

jobs:
  test:
    name: Playwright API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # NOTE: deliberately no `npx playwright install` — this is an API-only
      # suite using the `request` fixture. We don't need browsers, which saves
      # ~30s of install time per run.

      - name: Type-check
        run: npm run typecheck

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: 'true'

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
